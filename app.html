<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chore Board - First One Wins</title>
    <!-- Add your CSS and Supabase CDN links here -->
</head>
<body>
    <div id="app">
        <!-- Your UI Elements -->
    </div>

    <script>
        // ... (Your Supabase Config Init)

        async function loadTasks() {
            const { data: tasks, error } = await supabase.from('tasks').select('*');
            if (error) return console.error(error);

            // Handle recurring spawns
            const recurringTemplates = tasks.filter(t => t.is_recurring === true);
            const today = new Date().toISOString().split('T')[0];

            for (const template of recurringTemplates) {
                // Check if a version for today already exists
                const alreadyExists = tasks.some(t => t.title === template.title && t.due_date === today);

                if (!alreadyExists) {
                    // Create the fresh daily instance
                    await supabase.from('tasks').insert([{
                        title: template.title,
                        points: template.points,
                        is_recurring: true,
                        assigned_to: null, // RESET TO POOL
                        due_date: today,
                        status: 'pending'
                    }]);
                }
            }
            renderTasks(tasks);
        }

        // ... (Remaining Helper Functions)
        
        window.onload = loadTasks;
    </script>
</body>
</html>
